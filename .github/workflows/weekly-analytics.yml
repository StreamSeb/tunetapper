name: Weekly Analytics Issues

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without opening issues or saving state"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SA_JSON" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run analytics agent
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN_FLAG: ${{ inputs.dry_run && '--dry-run' || '' }}
        run: node scripts/agents/weekly-analytics.mjs $DRY_RUN_FLAG

      - name: Commit state if changed
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -z "$(git status --porcelain .github/agent-state/)" ]; then
            echo "No state changes to commit"
          else
            git config user.name "analytics-bot"
            git config user.email "analytics-bot@users.noreply.github.com"
            git add .github/agent-state/
            git commit -m "chore(agent): update analytics baseline"
            git push
          fi
